<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark card background -->
  <rect width="32" height="32" rx="6" fill="#0f0f11"/>
  <!-- Subtle grid lines -->
  <line x1="4" y1="23" x2="28" y2="23" stroke="#2a2a32" stroke-width="0.75"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#2a2a32" stroke-width="0.75"/>
  <line x1="4" y1="9"  x2="28" y2="9"  stroke="#2a2a32" stroke-width="0.75"/>
  <!-- Upward-trending market line -->
  <polyline
    points="4,25 8,21 12,23 16,15 20,18 24,11 28,7"
    fill="none"
    stroke="#f59e0b"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Glowing dot at the latest data point -->
  <circle cx="28" cy="7" r="2.5" fill="#f59e0b"/>
  <circle cx="28" cy="7" r="4"   fill="#f59e0b" opacity="0.25"/>
</svg>
